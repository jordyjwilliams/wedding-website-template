[build]
  command = "pnpm build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[[edge_functions]]
  function = "security_headers"
  path = "/*"

[dev]
  targetPort = 5174
  port = 8888
  publish = "build"

# Force HTTPS on all requests
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"

# Hashed immutable assets from SvelteKit build
[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Header cache control for images, fonts and animations.
# Static images: 1 week max-age with 1 day stale-while-revalidate to allow for updates if needed.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Fonts and animations
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/animations/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

