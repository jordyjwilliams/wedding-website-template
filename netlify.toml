[build]
  command = "pnpm build"
  publish = "build"

[functions]
  directory = "netlify/functions"

# Ref: https://content-security-policy.com/
# unsafe-eval required for dotlottie-svelte
# https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Content-Security-Policy/script-src#unsafe_webassembly_execution
# https://github.com/LottieFiles/dotlottie-web/issues/434
# https://github.com/LottieFiles/dotlottie-web/issues/221
# https://github.com/LottieFiles/dotlottie-web/issues/337#issuecomment-2309497241
# NOTE: wasm-unsafe-eval did not work here...
# TODO: fix unsafe-eval usage.
[[integrations]]
  name = "content-security-policy"
  [integrations.config]
    # Keep nonce-based script CSP managed by the extension.
    unsafeEval = true

[dev]
  targetPort = 5173
  port = 8888
  publish = "build"

# Force HTTPS on all requests
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict permissions for powerful features to prevent abuse
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Supplemental CSP directives for scanner coverage.
    # Keep script-src directives owned by the Netlify CSP extension to avoid nonce conflicts.
    Content-Security-Policy = "object-src 'none'; base-uri 'self'"
    # Introduce Trusted Types in report-only mode first to avoid breaking existing scripts.
    Content-Security-Policy-Report-Only = "require-trusted-types-for 'script'"

