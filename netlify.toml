[build]
  command = "pnpm build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[dev]
  targetPort = 5173
  port = 8888
  publish = "build"

# Force HTTPS on all requests
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict permissions for powerful features to prevent abuse
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Ref: https://content-security-policy.com/
    # wasm-unsafe-eval required for dotlottie-svelte
    # https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Content-Security-Policy/script-src#unsafe_webassembly_execution
    # https://github.com/LottieFiles/dotlottie-web/issues/434
    # https://github.com/LottieFiles/dotlottie-web/issues/221
    # https://github.com/LottieFiles/dotlottie-web/issues/337#issuecomment-2309497241
    Content-Security-Policy = """
      default-src 'none';
      script-src 'self' 'wasm-unsafe-eval';
      style-src 'self';
      object-src 'self';
      connect-src 'self';
      img-src 'self';
      base-uri 'self'
      frame-ancestors 'none';
      form-action 'self'
    """

