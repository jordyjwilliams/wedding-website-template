[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-csp-nonce"
  [plugins.inputs]
    reportOnly = false

[dev]
  targetPort = 5173
  port = 8888
  publish = "build"

# Force HTTPS on all requests
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true
