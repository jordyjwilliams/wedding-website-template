[build]
  command = "pnpm run build"
  publish = "build"

[build.environment]
  CSP_NONCE_DISTRIBUTION = "1"

[functions]
  directory = "netlify/functions"

[dev]
  targetPort = 5173
  port = 8888
  publish = "build"

# Force HTTPS on all requests
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
