[build]
  command = "pnpm build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[[edge_functions]]
  function = "security_headers"
  path = "/*"

[dev]
  targetPort = 5174
  port = 8888
  publish = "build"


# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
