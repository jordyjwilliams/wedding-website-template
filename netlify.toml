[build]
  command = "pnpm build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[dev]
  targetPort = 5173
  port = 8888
  publish = "build"

# Force HTTPS on all requests
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
  # 2 hours max-age for HSTS
    Strict-Transport-Security = '''
      max-age=7200;
      includeSubDomains;
      preload'''
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
