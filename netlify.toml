[build]
  command = "pnpm build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[dev]
  targetPort = 5173
  port = 8888
  publish = "build"

# Force HTTPS on all requests
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Global rate limiting for all site paths
[[redirects]]
  from = "/*"
  to = "/:splat"
  status = 200
  force = true
  [redirects.rate_limit]
    action = "rate_limit"
    window_limit = 180
    window_size = 60
    aggregate_by = ["ip", "domain"]

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
