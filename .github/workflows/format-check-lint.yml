# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: format, check, lint, test

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        node-version: [24.x, 25.x]

    steps:
      - uses: actions/checkout@v4
      # NOTE: caching handled by setup-node
      # REF: https://pnpm.io/continuous-integration#github-actions
      # REF: https://github.com/actions/setup-node#caching-global-packages-data
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Format (Prettier)
        run: pnpm run format:check
      - name: Lint (ESLint)
        run: pnpm run lint
      - name: Type check (svelte-check)
        run: pnpm run check
      - name: Security Audit (pnpm audit)
        run: pnpm audit --audit-level=low || true
      - name: Build (Vite)
        run: pnpm run build
